name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rename exe
        shell: bash
        run: mv dist/md-to-image-service.exe dist/md-to-image-service-${{ steps.version.outputs.VERSION }}-win-x64.exe

      - name: Package release
        shell: bash
        run: |
          mkdir -p release
          cp dist/md-to-image-service-${{ steps.version.outputs.VERSION }}-win-x64.exe release/
          cp -r public/ release/public/
          cd release && zip -r ../dist/md-to-image-service-${{ steps.version.outputs.VERSION }}-win-x64.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
          generate_release_notes: true
